name: Deploy Bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Clone or update repo
            if [ -d ~/3xui-shop ]; then
              cd ~/3xui-shop && git pull origin main
            else
              git clone https://github.com/Tarasusrus/3xui-shop.git ~/3xui-shop
              cd ~/3xui-shop
            fi

            # Write .env from secrets
            cat > .env << 'ENVEOF'
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            BOT_DEV_ID=${{ secrets.BOT_DEV_ID }}
            BOT_SUPPORT_ID=${{ secrets.BOT_SUPPORT_ID }}
            BOT_ADMINS=${{ secrets.BOT_ADMINS }}
            BOT_POLLING=True

            XUI_USERNAME=${{ secrets.XUI_USERNAME }}
            XUI_PASSWORD=${{ secrets.XUI_PASSWORD }}

            SHOP_CURRENCY=RUB
            SHOP_TRIAL_ENABLED=True
            SHOP_TRIAL_PERIOD=3
            SHOP_REFERRED_TRIAL_ENABLED=False
            SHOP_REFERRED_TRIAL_PERIOD=7
            SHOP_REFERRER_REWARD_ENABLED=True
            SHOP_REFERRER_REWARD_TYPE=days
            SHOP_REFERRER_LEVEL_ONE_PERIOD=30
            SHOP_REFERRER_LEVEL_TWO_PERIOD=1
            SHOP_REFERRER_MIN_SUBSCRIPTION_DAYS=30
            SHOP_REFERRER_LEVEL_ONE_RATE=10
            SHOP_REFERRER_LEVEL_TWO_RATE=1
            SHOP_BONUS_DEVICES_COUNT=0

            SHOP_PAYMENT_SBP_ENABLED=${{ secrets.SHOP_PAYMENT_SBP_ENABLED }}
            SHOP_SBP_PHONE=${{ secrets.SHOP_SBP_PHONE }}
            SHOP_SBP_BANK=${{ secrets.SHOP_SBP_BANK }}

            SHOP_PAYMENT_TON_ENABLED=${{ secrets.SHOP_PAYMENT_TON_ENABLED }}
            SHOP_TON_ADDRESS=${{ secrets.SHOP_TON_ADDRESS }}
            SHOP_TON_ACCOUNT=${{ secrets.SHOP_TON_ACCOUNT }}
            SHOP_TON_PRICE_USDT=${{ secrets.SHOP_TON_PRICE_USDT }}

            SHOP_PAYMENT_YOOKASSA_ENABLED=False
            SHOP_PAYMENT_CRYPTOMUS_ENABLED=False
            SHOP_PAYMENT_HELEKET_ENABLED=False
            SHOP_PAYMENT_YOOMONEY_ENABLED=False
            ENVEOF

            docker compose build
            docker compose up -d --force-recreate
            docker compose logs --tail=50 bot
